name: validate

on:
  push:
    branches: [main]
  pull_request:

# Third-party actions are pinned to a commit SHA (supply-chain hardening, #117);
# the trailing comment is the human-readable version. Dependabot (github-actions)
# keeps the SHA + comment updated.
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          docker compose config -q

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install api (pinned runtime + dev deps)
        run: pip install -r api/requirements-dev.txt && pip install --no-deps ./api
      - name: Ruff lint
        run: cd api && ruff check .
      - name: Ruff format check
        run: cd api && ruff format --check .
      - name: Type check (mypy)
        run: cd api && mypy app
      - name: Unit tests (with coverage)
        run: cd api && python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Install deps (from lockfile)
        run: cd frontend && npm ci --no-audit --no-fund
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Unit tests
        run: cd frontend && npm test
      - name: Build
        run: cd frontend && npm run build
      - name: Lint
        run: cd frontend && npm run lint

  images:
    # Build the app images so a broken Dockerfile / failed dependency resolution
    # is caught (the compose job only validates YAML, never builds), then scan them
    # with Trivy (#117). comfyui is intentionally omitted: its CUDA base is multi-GB
    # and needs a GPU runner, which the hosted runners don't provide.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build api image
        run: docker build -t ddlc-api ./api
      - name: Build frontend image
        run: docker build -t ddlc-frontend ./frontend
      # Fail only on fixable CRITICAL vulns so unfixable base-image CVEs don't
      # block the build (they still surface in the logs).
      - name: Scan api image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ddlc-api
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ddlc-frontend
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  secrets:
    # Secret scanning (#117): blocks a PR/push that introduces a credential.
    # .env.example placeholders are allow-listed in .gitleaks.toml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    # Advisory dependency scan: surfaces known vulnerabilities in the logs but
    # does not fail the build (transitive advisories are often unactionable;
    # Dependabot from #63 handles the actual version bumps).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: npm audit (frontend)
        # Reads the committed package-lock.json directly (no install needed).
        run: cd frontend && npm audit --audit-level=high || true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: pip-audit (api)
        run: |
          pip install pip-audit
          pip install ./api
          pip-audit || true
