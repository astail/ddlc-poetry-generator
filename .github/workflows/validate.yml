name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          docker compose config -q
