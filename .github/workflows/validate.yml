name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          docker compose config -q

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install api (pinned runtime + dev deps)
        run: pip install -r api/requirements-dev.txt && pip install --no-deps ./api
      - name: Ruff lint
        run: cd api && ruff check .
      - name: Ruff format check
        run: cd api && ruff format --check .
      - name: Unit tests (with coverage)
        run: cd api && python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install deps (from lockfile)
        run: cd frontend && npm ci --no-audit --no-fund
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Unit tests
        run: cd frontend && npm test
      - name: Build
        run: cd frontend && npm run build
      - name: Lint
        run: cd frontend && npm run lint

  images:
    # Actually build the app images so a broken Dockerfile / failed dependency
    # resolution is caught (the compose job only validates YAML, never builds).
    # comfyui is intentionally omitted: its CUDA base is multi-GB and needs a
    # GPU runner, which the hosted runners don't provide.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build api image
        run: docker build -t ddlc-api ./api
      - name: Build frontend image
        run: docker build -t ddlc-frontend ./frontend

  audit:
    # Advisory dependency scan: surfaces known vulnerabilities in the logs but
    # does not fail the build (transitive advisories are often unactionable;
    # Dependabot from #63 handles the actual version bumps).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: npm audit (frontend)
        # Reads the committed package-lock.json directly (no install needed).
        run: cd frontend && npm audit --audit-level=high || true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit (api)
        run: |
          pip install pip-audit
          pip install ./api
          pip-audit || true
