# DDLC Poetry Generator — compose skeleton (WIP)
# Services are scaffolded here; Dockerfiles and app code are filled in per-issue (M0–M3).
# Requires: Docker Compose v2+, NVIDIA driver + nvidia-container-toolkit on the host.

# Single source of truth for the DB connection string. The password is taken
# only from POSTGRES_PASSWORD (no duplicated literal in .env), and has NO
# default: compose fails fast if it is unset/empty instead of silently shipping
# the weak `change-me` credential. Shared by api + workers via `environment`.
x-database-url: &database-url
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ddlc}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (no default; see .env.example)}@db:5432/${POSTGRES_DB:-ddlc_poems}

services:
  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* are baked into the browser bundle at BUILD time, so they
        # must be passed as build args (not runtime env). Leave NEXT_PUBLIC_API_BASE
        # empty to let the browser derive the API host from how it accessed the page
        # (works for both localhost and LAN IPs); set it to pin an explicit URL.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
        NEXT_PUBLIC_API_PORT: ${API_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: [.env]
    environment: *database-url
    volumes:
      - data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-gpu:
    # Consumes image jobs from Redis and (in #12) calls ComfyUI's HTTP API.
    # Reuses the api image (shared `app` package); no direct GPU needed here.
    build: ./api
    command: ["python", "-m", "app.worker_gpu"]
    env_file: [.env]
    environment: *database-url
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  worker-tts:
    # Default: Piper on CPU. Reuses the api image (shared `app` package).
    # For XTTS (GPU), uncomment the `deploy` block below and ensure it does not
    # run concurrently with heavy image generation (#16).
    build: ./api
    command: ["python", "-m", "app.worker_tts"]
    env_file: [.env]
    environment: *database-url
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  comfyui:
    # Stable Diffusion runtime. Holds the GPU. Mount model weights from the host
    # (weights are NOT committed to this repo — see DISCLAIMER.md).
    # Fetch a checkpoint first:  ./comfyui/download_models.sh
    build: ./comfyui
    # NOT published to the host: ComfyUI has no auth, so exposing :8188 would let
    # anyone on the LAN run arbitrary workflows / read files / hog the GPU.
    # worker-gpu reaches it over the compose network as `comfyui:8188`, so no
    # host port mapping is needed (matches docs/ARCHITECTURE.md "internal only").
    # For local debugging only, bind to loopback explicitly:
    #   ports:
    #     - "127.0.0.1:8188:8188"
    volumes:
      - ./models/comfyui:/models   # place SD checkpoints / VAE / loras here
      - data:/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ddlc}
      # No default: fail fast if unset/empty rather than booting with a weak,
      # publicly-known password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (no default; see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-ddlc_poems}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ddlc} -d ${POSTGRES_DB:-ddlc_poems}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  data:
  pgdata:
