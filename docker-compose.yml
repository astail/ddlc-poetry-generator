# DDLC Poetry Generator — compose skeleton (WIP)
# Services are scaffolded here; Dockerfiles and app code are filled in per-issue (M0–M3).
# Requires: Docker Compose v2+, NVIDIA driver + nvidia-container-toolkit on the host.

# Single source of truth for the service connection strings (Postgres + Redis).
# Passwords come only from POSTGRES_PASSWORD / REDIS_PASSWORD (no duplicated
# literals in .env) and have NO default: compose fails fast if either is
# unset/empty instead of silently shipping a weak credential. Shared by api +
# workers via `environment`.
x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ddlc}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (no default; see .env.example)}@db:5432/${POSTGRES_DB:-ddlc_poems}
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env (no default; see .env.example)}@redis:6379/0

services:
  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* are baked into the browser bundle at BUILD time, so they
        # must be passed as build args (not runtime env). Leave NEXT_PUBLIC_API_BASE
        # empty to let the browser derive the API host from how it accessed the page
        # (works for both localhost and LAN IPs); set it to pin an explicit URL.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
        NEXT_PUBLIC_API_PORT: ${API_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    networks: [edge]
    restart: unless-stopped

  # One-shot DB migration: runs `alembic upgrade head` once and exits. api and
  # the workers wait for it to finish (service_completed_successfully) so the
  # very first request after `docker compose up` can't hit missing tables (#64).
  # Reuses the api image (alembic is installed there) and the same DATABASE_URL.
  migrate:
    build: ./api
    command: ["alembic", "upgrade", "head"]
    env_file: [.env]
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  api:
    build: ./api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: [.env]
    environment: *app-env
    volumes:
      - data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # api straddles both networks: reachable by the browser via the published
    # port and by the frontend (edge), and able to reach db/redis (internal).
    networks: [edge, internal]
    restart: unless-stopped

  worker-gpu:
    # Consumes image jobs from Redis and (in #12) calls ComfyUI's HTTP API.
    # Reuses the api image (shared `app` package); no direct GPU needed here.
    build: ./api
    command: ["python", "-m", "app.worker_gpu"]
    env_file: [.env]
    environment: *app-env
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]
    restart: unless-stopped

  worker-tts:
    # Default: Piper on CPU. Reuses the api image (shared `app` package).
    # For XTTS (GPU), uncomment the `deploy` block below and ensure it does not
    # run concurrently with heavy image generation (#16).
    build: ./api
    command: ["python", "-m", "app.worker_tts"]
    env_file: [.env]
    environment: *app-env
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  voicevox:
    # Japanese TTS engine (anime-style voices) used for lang=ja audio (#89).
    # Part of the default stack: `docker compose up` starts it so Japanese audio
    # works out of the box. worker-tts routes ja jobs here via VOICEVOX_URL,
    # which defaults to http://voicevox:50021 in .env / .env.example. Like
    # worker-gpu → comfyui, worker-tts connects lazily per job, so no startup
    # dependency or healthcheck is needed and English audio is never blocked on
    # it. To run without Japanese audio: `docker compose up --scale voicevox=0`
    # (and clear VOICEVOX_URL) — the UI then disables ja audio instead of
    # failing. CPU image by default; for the GPU build use the nemo-* tag and
    # add a `deploy` GPU reservation like comfyui's below.
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    # Not published to the host: only worker-tts needs it, over the internal
    # network as `voicevox:50021`.
    networks: [internal]
    restart: unless-stopped

  comfyui:
    # Stable Diffusion runtime. Holds the GPU. Mount model weights from the host
    # (weights are NOT committed to this repo — see DISCLAIMER.md).
    # Fetch a checkpoint first:  ./comfyui/download_models.sh
    build: ./comfyui
    # NOT published to the host: ComfyUI has no auth, so exposing :8188 would let
    # anyone on the LAN run arbitrary workflows / read files / hog the GPU.
    # worker-gpu reaches it over the compose network as `comfyui:8188`, so no
    # host port mapping is needed (matches docs/ARCHITECTURE.md "internal only").
    # For local debugging only, bind to loopback explicitly:
    #   ports:
    #     - "127.0.0.1:8188:8188"
    volumes:
      - ./models/comfyui:/models   # place SD checkpoints / VAE / loras here
      - data:/data
    networks: [internal]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ddlc}
      # No default: fail fast if unset/empty rather than booting with a weak,
      # publicly-known password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (no default; see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-ddlc_poems}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ddlc} -d ${POSTGRES_DB:-ddlc_poems}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # Require a password so a compromised container can't freely read/write the
    # job queue / retry counters. Credentials flow to clients via REDIS_URL.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env (no default; see .env.example)}"]
    environment:
      # Lets the healthcheck's `redis-cli ping` authenticate without putting the
      # password on the command line (avoids the NOAUTH failure / -a warning).
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env (no default; see .env.example)}
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# Two isolated networks (defence in depth): `edge` carries browser-facing
# traffic (frontend + api), `internal` carries backend traffic (db, redis,
# comfyui, workers, migrate). api is on both; db/redis/comfyui are NOT on edge,
# so a compromised frontend cannot reach them directly.
networks:
  edge:
  internal:

volumes:
  data:
  pgdata:
